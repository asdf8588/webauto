# 登录模块测试用例
# 整合自: data/login/cases.yaml + test_data/login_cases.yaml

- case_id: LOGIN001
  name: 正常登录成功
  description: 使用正确邮箱密码登录
  method: POST
  url: /users/login
  body:
    email: "test2@example.com"
    password: "123456"
  expected:
    status: 200
  allure_feature: 登录模块
  allure_story: 正常登录

- case_id: LOGIN002
  name: 密码错误_登录失败
  description: 使用错误密码登录应失败
  method: POST
  url: /users/login
  body:
    email: "test2@example.com"
    password: "wrongpass"
  expected:
    status: 400
  allure_feature: 登录模块
  allure_story: 密码错误

- case_id: LOGIN003
  name: 邮箱不存在_登录失败
  description: 未注册的邮箱无法登录
  method: POST
  url: /users/login
  body:
    email: "notexist@test.com"
    password: "123456"
  expected:
    status: 400
  allure_feature: 登录模块
  allure_story: 用户不存在

- case_id: LOGIN004
  name: 邮箱格式错误
  description: 邮箱格式不正确应登录失败
  method: POST
  url: /users/login
  body:
    email: "not-a-email"
    password: "123456"
  expected:
    status: 400
  allure_feature: 登录模块
  allure_story: 参数校验

- case_id: LOGIN005
  name: 邮箱为空
  description: 邮箱为空应登录失败
  method: POST
  url: /users/login
  body:
    email: ""
    password: "123456"
  expected:
    status: 400
  allure_feature: 登录模块
  allure_story: 参数校验

- case_id: LOGIN006
  name: 密码为空
  description: 密码为空应登录失败
  method: POST
  url: /users/login
  body:
    email: "test2@example.com"
    password: ""
  expected:
    status: 400
  allure_feature: 登录模块
  allure_story: 参数校验

- case_id: LOGIN007
  name: 并发登录测试
  description: 测试用户登录功能
  method: POST
  url: /users/login
  body:
    email: "admin@example.com"
    password: "123456"
  expected:
    status: 200
  allure_feature: 登录模块
  allure_story: 并发登录
