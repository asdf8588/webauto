# 用户查询模块测试用例
# 整合自: data/user/query.yaml

- case_id: QUERY001
  name: 带Token查询_成功
  description: 使用登录后的token查询用户列表
  method: GET
  url: /users
  expected:
    status: 200
  requires_auth: true
  setup:
    - action: register_login
      name: "QueryUser_{__AUTO_UUID__}"
      email: "query_{__AUTO_UUID__}@example.com"
      password: "Test@123456"
  allure_feature: 查询模块
  allure_story: 正常查询

- case_id: QUERY002
  name: 无Token查询
  description: 不带认证token的查询行为
  method: GET
  url: /users
  expected:
    status: 200
  allure_feature: 查询模块
  allure_story: 无认证查询

- case_id: QUERY003
  name: 查询指定用户详情
  description: 查询已注册用户的详细信息
  method: GET
  url: /users/seek/{user_id}
  expected:
    status: 200
  requires_auth: true
  setup:
    - action: register_login
      name: "DetailUser_{__AUTO_UUID__}"
      email: "detail_{__AUTO_UUID__}@example.com"
      password: "Test@123456"
  allure_feature: 查询模块
  allure_story: 用户详情
