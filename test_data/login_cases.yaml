# 登录测试用例 - YAML 格式（修正后）
# 与 Excel 保持一致：后端返回统一错误"邮箱或密码错误"

- name: "正常登录"
  case_id: TC001
  email: "test2@example.com"
  password: "123456"
  expect_result: "登录成功"
  expect_type: "success"
  allure_feature: "登录模块"
  allure_story: "正常登录"

- name: "密码错误"
  case_id: TC002
  email: "test2@example.com"
  password: "wrongpass"
  expect_result: "邮箱或密码错误"
  expect_type: "error"
  allure_feature: "登录模块"
  allure_story: "密码错误"

- name: "邮箱不存在"
  case_id: TC003
  email: "notexist@test.com"
  password: "123456"
  expect_result: "邮箱或密码错误"
  expect_type: "error"
  allure_feature: "登录模块"
  allure_story: "用户不存在"

- name: "邮箱格式错误"
  case_id: TC004
  email: "not-a-email"
  password: "123456"
  expect_result: "邮箱或密码错误"
  expect_type: "error"
  allure_feature: "登录模块"
  allure_story: "参数校验"

- name: "邮箱为空"
  case_id: TC005
  email: ""
  password: "123456"
  expect_result: "邮箱或密码错误"
  expect_type: "error"
  allure_feature: "登录模块"
  allure_story: "参数校验"

- name: "密码为空"
  case_id: TC006
  email: "test2@example.com"
  password: ""
  expect_result: "邮箱或密码错误"
  expect_type: "error"
  allure_feature: "登录模块"
  allure_story: "参数校验"
