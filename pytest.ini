# pytest.ini
[pytest]
# 测试目录
testpaths = tests

# 报告输出
alluredir = allure-results
htmlpath = reports/report.html
jsonpath = reports/report.json

# 标记
markers =
    smoke: 冒烟测试
    regression: 回归测试
    api: API 测试
    ui: UI 测试
    login: 登录相关测试
    user: 用户相关测试
    e2e: 端到端测试

# 命令行选项
addopts = -v --tb=short --strict-markers

# 日志
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
