[pytest]
# main.py 专用配置：包含所有测试目录 + playwright 配置
testpaths = tests testcases api_testing/testcases ui_testing/testcases
python_files = test_*.py
python_functions = test_*

# playwright 配置
addopts =
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure

markers =
    smoke: 冒烟测试
    regression: 回归测试
    ui: UI 自动化测试
    api: API 接口测试
