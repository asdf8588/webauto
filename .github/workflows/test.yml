# GitHub Actions - 测试 & Allure 报告
name: API Tests & Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装依赖（修复：使用 requirements.txt）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest allure-pytest requests pyyaml

      # 4. 运行测试
      - name: Run tests
        run: |
          pytest tests/ -v --alluredir=allure-results || true
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:8080' }}

      # 5. 生成 Allure 报告
      - name: Generate Allure report
        if: always()
        run: |
          pip install allure-pytest
          allure generate allure-results -o public --clean || echo "No results to generate"

      # 6. 部署到 Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: github.ref == 'refs/heads/main'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

      # 7. 输出报告链接
      - name: Show report URL
        if: success() && github.ref == 'refs/heads/main'
        run: |
          echo "✅ Report deployed!"
