name: Test & Allure Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt || pip install pytest allure-pytest requests pyyaml

      - name: Run tests
        run: |
          pytest tests/ -v --alluredir=allure-results || echo "Tests completed with some failures"
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -f "$(pip show allure-pytest | grep Location | cut -d' ' -f2)/allure_pytest/attachment/allure" ]; then
            allure generate allure-results -o public --clean
          else
            pip install allure-pytest
            allure generate allure-results -o public --clean || echo "No report generated"
          fi
          ls -la public/ || echo "Report directory not created"

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
