# 登录测试用例 - 统一版本
# 整合自: test_data/login_cases.xlsx, test_data/login_cases.yaml, data/login/cases.yaml
# 去重后总计: 10条

- case_id: LOGIN001
  name: 正常登录_成功
  description: 使用正确的邮箱和密码登录
  module: 登录模块
  priority: P0
  tags: [smoke, blocker, regression]
  method: POST
  url: /users/login
  body:
    email: "test2@example.com"
    password: "123456"
  expected:
    status: 200
    type: success
    message: "登录成功"

- case_id: LOGIN002
  name: 登录失败_密码错误
  description: 使用错误密码登录应失败
  module: 登录模块
  priority: P0
  tags: [regression, validation]
  method: POST
  url: /users/login
  body:
    email: "test2@example.com"
    password: "wrongpass"
  expected:
    status: 400
    type: error
    message: "邮箱或密码错误"

